# ---------------------------------------------------------------------------
# Screena — production stack using PRE-BUILT images from GHCR + HTTPS.
#
# No local build needed; great for Raspberry Pi or low-RAM VPS.
#
# Prereqs:
#   1. Set DOMAIN, ADMIN_EMAIL_FOR_TLS, JWT_SECRET in .env
#   2. Set OWNER to your GitHub org / username (the one that publishes images
#      via .github/workflows/release.yml)
#   3. Optionally pin SCREENA_VERSION (defaults to "latest")
#
# Run:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
# ---------------------------------------------------------------------------
services:
    mongo:
        image: mongo:7
        restart: unless-stopped
        volumes:
            - screena_mongo_data:/data/db
        expose:
            - "27017"

    backend:
        image: ghcr.io/${OWNER:?Set OWNER in .env (e.g. your GitHub username)}/screena-backend:${SCREENA_VERSION:-latest}
        restart: unless-stopped
        depends_on:
            - mongo
        environment:
            MONGO_URL: "mongodb://mongo:27017"
            DB_NAME: "${DB_NAME:-screena_db}"
            CORS_ORIGINS: "https://${DOMAIN:?Set DOMAIN in .env}"
            JWT_SECRET: "${JWT_SECRET:?Set JWT_SECRET in .env}"
            ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@screena.app}"
            ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin123}"
        expose:
            - "8001"

    frontend:
        image: ghcr.io/${OWNER}/screena-frontend:${SCREENA_VERSION:-latest}
        restart: unless-stopped
        depends_on:
            - backend
        expose:
            - "80"

    caddy:
        image: caddy:2-alpine
        restart: unless-stopped
        depends_on:
            - frontend
        ports:
            - "80:80"
            - "443:443"
            - "443:443/udp"
        environment:
            DOMAIN: "${DOMAIN}"
            ADMIN_EMAIL_FOR_TLS: "${ADMIN_EMAIL_FOR_TLS:-admin@${DOMAIN}}"
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile:ro
            - screena_caddy_data:/data
            - screena_caddy_config:/config

volumes:
    screena_mongo_data:
    screena_caddy_data:
    screena_caddy_config:
