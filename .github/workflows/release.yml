name: build-and-publish

# Build & push the backend and frontend container images to GHCR
# whenever a `v*.*.*` tag is pushed (or manually via the Actions UI).
# Multi-arch so the images run on amd64 servers AND on arm64 Raspberry Pis.

on:
    push:
        tags:
            - "v*.*.*"
    workflow_dispatch:

env:
    REGISTRY: ghcr.io
    OWNER: ${{ github.repository_owner }}

jobs:
    build:
        name: build (${{ matrix.component }})
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        strategy:
            fail-fast: false
            matrix:
                include:
                    - component: backend
                      context: ./backend
                      image: screena-backend
                    - component: frontend
                      context: ./frontend
                      image: screena-frontend

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata (tags, labels)
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}
                  tags: |
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=semver,pattern={{major}}
                      type=raw,value=latest,enable={{is_default_branch}}
                  labels: |
                      org.opencontainers.image.title=Screena ${{ matrix.component }}
                      org.opencontainers.image.description=Screena ${{ matrix.component }} image
                      org.opencontainers.image.source=https://github.com/${{ github.repository }}
                      org.opencontainers.image.licenses=MIT

            - name: Build & push
              uses: docker/build-push-action@v6
              with:
                  context: ${{ matrix.context }}
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha,scope=${{ matrix.component }}
                  cache-to: type=gha,scope=${{ matrix.component }},mode=max
